<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#07071A"/>
  <!-- Subtle gradient overlay -->
  <rect width="64" height="64" rx="14" fill="url(#bg-grad)" opacity="0.6"/>
  <!-- Headphone arc -->
  <path d="M16 30 C16 19 22 12 32 12 C42 12 48 19 48 30" stroke="#1DB954" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <!-- Left ear cup -->
  <rect x="10" y="29" width="10" height="16" rx="5" fill="#1DB954"/>
  <!-- Right ear cup -->
  <rect x="44" y="29" width="10" height="16" rx="5" fill="#1DB954"/>
  <!-- Left ear cup inner glow -->
  <rect x="12" y="31" width="6" height="12" rx="3" fill="#0a7a35" opacity="0.5"/>
  <!-- Right ear cup inner glow -->
  <rect x="46" y="31" width="6" height="12" rx="3" fill="#0a7a35" opacity="0.5"/>
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1DB954" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
</svg>
